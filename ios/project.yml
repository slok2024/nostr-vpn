name: NostrVpnIos
options:
  bundleIdPrefix: to.iris.nvpn
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: ${NVPN_APP_VERSION_NAME:-4.0.20}
    # Apple uses (CFBundleShortVersionString, CFBundleVersion) as the unique
    # build key on App Store Connect. Hardcoding CURRENT_PROJECT_VERSION = 1
    # makes every TestFlight upload at the same marketing version conflict
    # silently. NVPN_APP_VERSION_CODE is derived from the workspace version
    # (4.0.19 -> 4001019) so each release lands a unique CFBundleVersion.
    # scripts/ios-build sources release_common.sh + resolve_shared_build_metadata
    # before xcodegen so both env vars resolve at project-generation time.
    # The :-default fallback keeps `tools/run-ios` (debug builds, no release env)
    # working without crashing xcodegen.
    CURRENT_PROJECT_VERSION: ${NVPN_APP_VERSION_CODE:-1}
    VERSIONING_SYSTEM: apple-generic
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0

targets:
  NostrVpnIos:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: Nostr VPN
        PRODUCT_MODULE_NAME: NostrVpnIos
        PRODUCT_BUNDLE_IDENTIFIER: to.iris.nvpn
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: NostrVpnIos.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        HEADER_SEARCH_PATHS: $(PROJECT_DIR)/Bindings
        SWIFT_OBJC_BRIDGING_HEADER: Bindings/NostrVpnAppCoreC.h
    dependencies:
      - framework: Frameworks/NostrVpnAppCore.xcframework
        embed: false
      - target: PacketTunnel
        embed: true
        codeSign: true
        copy:
          destination: plugins
      - sdk: NetworkExtension.framework
      - sdk: AppIntents.framework
      - sdk: SystemConfiguration.framework

  PacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: PacketTunnel
    settings:
      base:
        PRODUCT_NAME: Nostr VPN Tunnel
        PRODUCT_MODULE_NAME: PacketTunnel
        PRODUCT_BUNDLE_IDENTIFIER: to.iris.nvpn.PacketTunnel
        INFOPLIST_FILE: PacketTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: PacketTunnel/PacketTunnel.entitlements
        HEADER_SEARCH_PATHS: $(PROJECT_DIR)/Bindings
        SWIFT_OBJC_BRIDGING_HEADER: Bindings/NostrVpnAppCoreC.h
    dependencies:
      - framework: Frameworks/NostrVpnAppCore.xcframework
        embed: false
      - sdk: NetworkExtension.framework
      - sdk: SystemConfiguration.framework
