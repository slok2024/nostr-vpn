services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      additional_contexts:
        fips: ../fips
    command: ["nostr-vpn-relay", "--bind", "0.0.0.0:8080"]
    networks:
      e2e:
        ipv4_address: 10.203.0.2

  node-a:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      additional_contexts:
        fips: ../fips
    entrypoint: ["sleep", "infinity"]
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    depends_on:
      - relay
    networks:
      e2e:
        ipv4_address: 10.203.0.10

  node-b:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      additional_contexts:
        fips: ../fips
    entrypoint: ["sleep", "infinity"]
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    depends_on:
      - relay
    networks:
      e2e:
        ipv4_address: 10.203.0.11

  node-c:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      additional_contexts:
        fips: ../fips
    entrypoint: ["sleep", "infinity"]
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    depends_on:
      - relay
    networks:
      e2e:
        ipv4_address: 10.203.0.12

networks:
  e2e:
    driver: bridge
    ipam:
      config:
        - subnet: 10.203.0.0/24
