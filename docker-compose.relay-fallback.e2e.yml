services:
  nostr-relay:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      additional_contexts:
        fips: ../fips
    command:
      - sh
      - -lc
      - |
        set -eu
        exec nostr-vpn-relay --bind 0.0.0.0:8080 >/tmp/nostr-relay.log 2>&1
    networks:
      e2e:
        ipv4_address: 10.203.1.2

  relay-asym:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      additional_contexts:
        fips: ../fips
    environment:
      NVPN_RELAY_SECRET_KEY: "1111111111111111111111111111111111111111111111111111111111111111"
    command:
      - sh
      - -lc
      - |
        set -eu
        exec nvpn-udp-relay \
          --secret-key "$$NVPN_RELAY_SECRET_KEY" \
          --relay ws://10.203.1.2:8080 \
          --advertise-host 10.203.1.4 \
          --publish-interval-secs 5 \
          >/tmp/nvpn-udp-relay.log 2>&1
    depends_on:
      - nostr-relay
    networks:
      e2e:
        ipv4_address: 10.203.1.4

  relay-good:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      additional_contexts:
        fips: ../fips
    environment:
      NVPN_RELAY_SECRET_KEY: "3333333333333333333333333333333333333333333333333333333333333333"
    command:
      - sh
      - -lc
      - |
        set -eu
        sleep 10
        exec nvpn-udp-relay \
          --secret-key "$$NVPN_RELAY_SECRET_KEY" \
          --relay ws://10.203.1.2:8080 \
          --advertise-host 10.203.1.3 \
          --publish-interval-secs 5 \
          >/tmp/nvpn-udp-relay.log 2>&1
    depends_on:
      - nostr-relay
    networks:
      e2e:
        ipv4_address: 10.203.1.3

  node-a:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      additional_contexts:
        fips: ../fips
    entrypoint: ["sleep", "infinity"]
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    depends_on:
      - nostr-relay
      - relay-good
      - relay-asym
    networks:
      e2e:
        ipv4_address: 10.203.1.10

  node-b:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      additional_contexts:
        fips: ../fips
    entrypoint: ["sleep", "infinity"]
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    depends_on:
      - nostr-relay
      - relay-good
      - relay-asym
    networks:
      e2e:
        ipv4_address: 10.203.1.11

networks:
  e2e:
    driver: bridge
    ipam:
      config:
        - subnet: 10.203.1.0/24
